apiVersion: apps/v1
kind: Deployment
metadata:
  name: fireserve-gateway
  labels:
    app: fireserve
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fireserve
      component: gateway
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: fireserve
        component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics/prometheus"
    spec:
      containers:
        - name: gateway
          image: fireserve-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: fireserve-config
                  key: log_level
            - name: MAX_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: fireserve-config
                  key: max_batch_size
            - name: REQUEST_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: fireserve-config
                  key: request_timeout
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30
